<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIR Paper Digest</title>
  <style>
    :root {
      color-scheme: light;
      --ink: oklch(23% 0.018 225);
      --muted: oklch(48% 0.018 225);
      --line: oklch(88% 0.014 225);
      --paper: oklch(99% 0.006 210);
      --soft: oklch(96% 0.012 210);
      --accent: oklch(46% 0.11 178);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--soft);
      color: var(--ink);
      line-height: 1.62;
    }
    main {
      width: min(880px, calc(100% - 28px));
      margin: 36px auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.2; letter-spacing: 0; }
    p { color: var(--muted); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>MIR Paper Digest</h1>
    <p>Daily report index will be generated by the automation.</p>
  </main>
</body>
</html>
