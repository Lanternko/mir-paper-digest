<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIR Paper Digest</title>
  <style>
    :root {
      color-scheme: light;
      --ink: oklch(23% 0.018 225);
      --muted: oklch(48% 0.018 225);
      --line: oklch(88% 0.014 225);
      --paper: oklch(99% 0.006 210);
      --soft: oklch(96% 0.012 210);
      --accent: oklch(46% 0.11 178);
      --accent-soft: oklch(92% 0.045 178);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--soft);
      color: var(--ink);
      line-height: 1.62;
    }
    main {
      width: min(920px, calc(100% - 28px));
      margin: 34px auto;
    }
    .hero {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.2; letter-spacing: 0; }
    p { color: var(--muted); margin: 0 0 18px; max-width: 66ch; }
    a { color: var(--accent); }
    .latest {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--accent);
      color: oklch(98% 0.008 180);
      text-decoration: none;
      font-weight: 800;
    }
    .disabled { background: var(--line); color: var(--muted); }
    .reports {
      display: grid;
      gap: 8px;
    }
    .report-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
    }
    .report-link span { color: var(--ink); font-weight: 800; }
    .report-link strong { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>MIR Paper Digest</h1>
      <p>MeanAudio 優先，其次 karaoke-jp。每天兩篇，卡片式閱讀，點開看摘要與可行性。</p>
      <a class="latest" href="reports/2026-05-23.html">閱讀最新報告</a>
      <p style="margin-top:14px;font-size:13px;">Base URL: https://lanternko.github.io/mir-paper-digest/</p>
    </section>
    <section class="reports" aria-label="歷史報告">
      <a class="report-link" href="reports/2026-05-23.html"><span>2026-05-23</span><strong>開啟報告</strong></a>
    </section>
  </main>
</body>
</html>
